name: Release Package

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build distributable jar
        run: ./gradlew --no-daemon clean shadowJar

      - name: Resolve artifact path
        run: |
          DIST_JAR="$(find build/libs -maxdepth 1 -type f -name '*.jar' | sort | head -n 1)"
          if [ -z "$DIST_JAR" ]; then
            echo "No jar file found in build/libs" >&2
            exit 1
          fi
          echo "DIST_JAR=$DIST_JAR" >> "$GITHUB_ENV"

      - name: Upload distributable
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: ${{ env.DIST_JAR }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: VelocityHotReloader ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ env.DIST_JAR }}
