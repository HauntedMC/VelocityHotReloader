name: Feature Request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Keep it concrete so maintainers can evaluate scope and impact.
  - type: checkboxes
    id: precheck
    attributes:
      label: Pre-check
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: This proposal is specific and actionable.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: Describe the current pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What behavior or feature would you like to see?
      placeholder: Describe the desired change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Command UX
        - Plugin Lifecycle
        - Watcher / Auto-Reload
        - Messages / Localization
        - Permissions
        - Tooling / CI
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: impact
    attributes:
      label: Impact (Optional)
      options:
        - label: May require permission/config changes
          required: false
        - label: May affect backward compatibility
          required: false
        - label: May affect runtime performance
          required: false
        - label: May affect security/privacy behavior
          required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered (Optional)
      placeholder: What alternatives did you consider?
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria (Optional)
      description: How should maintainers verify this is done?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional Context (Optional)
      description: References, examples, screenshots, or related links.
    validations:
      required: false
